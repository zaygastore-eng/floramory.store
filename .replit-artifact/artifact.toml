kind = "web"
previewPath = "/"
title = "Floramory"
version = "1.0.0"
id = "artifacts/floramory"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23869

[services.development]
run = "pnpm --filter @workspace/floramory run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/floramory", "run", "build" ]
publicDir = "artifacts/floramory/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23869"
BASE_PATH = "/"
